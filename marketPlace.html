<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="Dashboard.css">
</head>

<body>
    <div class="market-head">
        <img src="img/market-bg.jpg" alt="" class="market-img" height="100px">
        <div class="market-text">
            <h1>Marketplace</h1>
        </div>
        <div class="market-back">
            <a href="Dashboard.html"><i class="fa-solid fa-arrow-left"></i></a>
        </div>

        <div class="featured-pro">
            <h3>Featured Products</h3>
            <button class="featured-btn1">All</button>
            <button class="featured-btn2">Organic</button>
            <button class="featured-btn2">NPK</button>
        </div>


        <div class="featured-img">

            <img src="img/market-img1.png" alt="" width="60%">
            <div class="market-img1-text">
                <p>ORGANIC</p>
                <p><strong>NPK -0:0:50</strong></p>
                <p style="color: green;">Rs.2400/=</p>
                <a href="marketPlace-shop.html"><button class="featured-btn-shop"><i class="fa-solid fa-bag-shopping"></i> Shop
                        Now</button></a>

            </div>

        </div>


        <div class="featured-img" >

            <img src="img/market-img2.png" alt="" width="60%">
            <div class="market-img1-text">
                <p>ORGANIC</p>
                <p><strong>NPK -15:15:15</strong></p>
                <p style="color: green;">Rs.1500/=</p>
                <a href="marketPlace-shop.html"><button class="featured-btn-shop"><i class="fa-solid fa-bag-shopping"></i> Shop
                        Now</button></a>

            </div>

        </div>


        <div class="featured-img">

            <img src="img/market-img1.png" alt="" width="60%">
            <div class="market-img1-text">
                <p>ORGANIC</p>
                <p><strong>NPK -19:19:19</strong></p>
                <p style="color: green;">Rs.800/=</p>
                <a href="marketPlace-shop.html"><button class="featured-btn-shop"><i class="fa-solid fa-bag-shopping"></i> Shop
                        Now</button></a>

            </div>

        </div>



</body>

</html>
